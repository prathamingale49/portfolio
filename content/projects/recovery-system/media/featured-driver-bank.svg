<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Recovery driver bank layout placeholder</title>
  <desc id="desc">Stylized PCB layout detail for recovery driver banks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#151b28"/>
      <stop offset="1" stop-color="#071018"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="960" height="600" fill="url(#bg)"/>
  <rect x="70" y="62" width="820" height="476" rx="18" fill="#11261f" stroke="#2c463b" stroke-width="2"/>
  <g fill="none" stroke="#c69b3c" stroke-linecap="round" stroke-linejoin="round">
    <path d="M142 172h182l60 60h146l84 84h174" stroke-width="18" filter="url(#glow)"/>
    <path d="M142 248h156l62 62h170l78 78h210" stroke-width="14"/>
    <path d="M142 326h132l54 54h198l68 68h240" stroke-width="12"/>
    <path d="M260 420h130l52-52" stroke-width="10"/>
  </g>
  <g fill="#1d2432" stroke="#7d8798" stroke-width="2">
    <rect x="600" y="146" width="92" height="70" rx="8"/>
    <rect x="718" y="146" width="92" height="70" rx="8"/>
    <rect x="600" y="286" width="92" height="70" rx="8"/>
    <rect x="718" y="286" width="92" height="70" rx="8"/>
    <rect x="600" y="414" width="92" height="70" rx="8"/>
    <rect x="718" y="414" width="92" height="70" rx="8"/>
  </g>
  <g fill="#0b1018" stroke="#d7e0ec" stroke-width="3">
    <circle cx="146" cy="172" r="16"/>
    <circle cx="146" cy="248" r="16"/>
    <circle cx="146" cy="326" r="16"/>
    <circle cx="834" cy="316" r="16"/>
    <circle cx="834" cy="388" r="16"/>
    <circle cx="834" cy="448" r="16"/>
  </g>
  <g fill="#cbd5e1" font-family="Inter, Segoe UI, sans-serif" font-weight="700">
    <text x="90" y="108" font-size="22">RECOVERY DRIVER BANK</text>
    <text x="610" y="132" font-size="15" fill="#94a3b8">LOAD SWITCHES</text>
  </g>
</svg>
