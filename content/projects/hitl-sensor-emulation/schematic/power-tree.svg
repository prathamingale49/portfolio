<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Power tree schematic placeholder">
  <rect width="1600" height="1000" fill="#f8fafc"/>
  <text x="70" y="80" font-family="Inter, Arial" font-size="40" font-weight="700" fill="#0f172a">Power Tree</text>
  <text x="70" y="120" font-family="Inter, Arial" font-size="18" fill="#475569">Input protection, switching conversion, load switches, and precision analog references.</text>
  <g fill="none" stroke="#cbd5e1" stroke-width="1">
    <path d="M0 200h1600M0 400h1600M0 600h1600M0 800h1600M200 0v1000M400 0v1000M600 0v1000M800 0v1000M1000 0v1000M1200 0v1000M1400 0v1000"/>
  </g>
  <g font-family="Inter, Arial" stroke="#334155" stroke-width="3">
    <rect x="90" y="395" width="230" height="160" rx="14" fill="#eef2ff"/>
    <text x="125" y="465" font-size="28" font-weight="700" fill="#0f172a">24 V IN</text>
    <text x="125" y="505" font-size="18" fill="#475569">Fuse + TVS</text>
    <rect x="410" y="380" width="250" height="190" rx="14" fill="#ecfeff"/>
    <text x="455" y="460" font-size="28" font-weight="700" fill="#0f172a">Buck</text>
    <text x="455" y="500" font-size="18" fill="#475569">24 V to 5 V</text>
    <rect x="760" y="290" width="260" height="170" rx="14" fill="#f0fdf4"/>
    <text x="805" y="365" font-size="28" font-weight="700" fill="#0f172a">3.3 V LDO</text>
    <text x="805" y="405" font-size="18" fill="#475569">Digital rail</text>
    <rect x="760" y="535" width="260" height="170" rx="14" fill="#fff7ed"/>
    <text x="805" y="610" font-size="28" font-weight="700" fill="#0f172a">AVDD LDO</text>
    <text x="805" y="650" font-size="18" fill="#475569">Analog rail</text>
    <rect x="1130" y="400" width="300" height="180" rx="14" fill="#fefce8"/>
    <text x="1180" y="480" font-size="28" font-weight="700" fill="#0f172a">References</text>
    <text x="1180" y="520" font-size="18" fill="#475569">DAC + ADC VREF</text>
    <path d="M320 475h90" stroke="#334155" stroke-width="4"/>
    <path d="M660 475h120" stroke="#334155" stroke-width="4"/>
    <path d="M660 475c110-80 170-100 230-100" stroke="#334155" stroke-width="4"/>
    <path d="M1020 620c90-50 140-70 260-70" stroke="#334155" stroke-width="4"/>
